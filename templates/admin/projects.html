{% extends "admin/base.html" %}
{% block content %}
<h1>Projects</h1>
<p class="subtitle">The cards shown in the Selected Work section.</p>

<div class="card">
  <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
    <a class="btn" href="{{ url_for('admin.project_new') }}">+ Add project</a>
  </div>
  {% for p in projects %}
  <div class="list-row">
    <div class="list-row__actions">
      <form method="post" action="{{ url_for('admin.project_move', pid=p.id, direction='up') }}">
        <button class="move-btn" type="submit" {{ 'disabled' if loop.first }}>↑</button>
      </form>
      <form method="post" action="{{ url_for('admin.project_move', pid=p.id, direction='down') }}">
        <button class="move-btn" type="submit" {{ 'disabled' if loop.last }}>↓</button>
      </form>
    </div>
    <div class="list-row__main">
      <div class="list-row__title">{{ p.title }}</div>
      <div class="list-row__meta">{{ p.tag }} · {{ p.stack }} · links to {{ p.link }}</div>
    </div>
    <div class="list-row__actions">
      <a class="btn btn-outline btn-sm" href="{{ url_for('admin.project_edit', pid=p.id) }}">Edit</a>
      <form method="post" action="{{ url_for('admin.project_delete', pid=p.id) }}" onsubmit="return confirm('Remove this project?')">
        <button class="btn-danger" type="submit">Remove</button>
      </form>
    </div>
  </div>
  {% else %}
  <p class="hint">No projects yet — add one above.</p>
  {% endfor %}
</div>
{% endblock %}
